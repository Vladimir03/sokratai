<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Сократ · Кабинет репетитора</title>

<!-- Tokens + fonts -->
<link rel="stylesheet" href="colors_and_type.css" />
<!-- Tutor helper classes -->
<link rel="stylesheet" href="tutor-kit/tokens.css" />
<!-- Students-workspace additions -->
<link rel="stylesheet" href="tutor-kit/students-split.css" />
<!-- Home dashboard v2 helpers -->
<link rel="stylesheet" href="tutor-kit/dashboard-home.css" />

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>

<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--sokrat-font); background: var(--sokrat-surface); color: var(--sokrat-fg1); }
  #root { height: 100%; }
  .katex { font-size: 1em; }
  .katex-display { margin: 0; }
</style>
</head>
<body class="sokrat" data-sokrat-mode="tutor" data-screen-label="Кабинет репетитора · Сократ AI">
<div id="root"></div>

<!-- Primitives -> Chrome -> Workplace -> Students workspace -> Templates -> App -->
<script type="text/babel" src="tutor-kit/primitives.jsx"></script>
<script type="text/babel" src="tutor-kit/chrome.jsx"></script>
<script type="text/babel" src="tutor-kit/workplace.jsx"></script>
<script type="text/babel" src="tutor-kit/students-split.jsx"></script>
<script type="text/babel" src="tutor-kit/templates.jsx"></script>
<script type="text/babel" src="tutor-kit/dashboard-home.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const ROUTES = {
  dashboard:  { crumbs: ["Сократ", "Главная"],                          render: (ctx) => <TplDashboardV2 onOpenStudent={(sid)=>ctx.goStudent(sid)} onOpenStudents={()=>ctx.goStudents()} onOpenHomework={(chat)=>ctx.goHomework(chat)} /> },
  schedule:   { crumbs: ["Сократ", "Расписание"],                       render: () => <ScheduleStub /> },
  homework:   { crumbs: ["Сократ", "Домашние задания"],                 render: () => <TplHomeworkList /> },
  homeworkDetail: { crumbs: ["Сократ", "Домашние задания", "Кинематика 1D"], render: () => <TplHomeworkDetail /> },
  students:   { crumbs: ["Сократ", "Ученики"],                          render: (ctx) => <StudentsRoute ctx={ctx}/> },
  groups:     { crumbs: ["Сократ", "Группы"],                           render: () => <GroupsStub /> },
  taskbank:   { crumbs: ["Сократ", "База задач"],                       render: () => <TplTaskBank /> },
  mytasks:    { crumbs: ["Сократ", "Мои задачи"],                       render: () => <MyTasksStub /> },
  payments:   { crumbs: ["Сократ", "Платежи"],                          render: () => <PaymentsStub /> },
  plans:      { crumbs: ["Сократ", "Тарифы"],                           render: () => <PlansStub /> },
};

const NAV_KEY_FOR = {
  dashboard: "dashboard", schedule: "schedule",
  homework: "homework", homeworkDetail: "homework",
  students: "students",
  groups: "groups",
  taskbank: "taskbank", mytasks: "mytasks",
  payments: "payments", plans: "plans",
};

function ScheduleStub() {
  const week = [
    { day:0, hour:10, time:"10:00", name:"Маша К.",    topic:"Кинематика",   stream:"ЕГЭ" },
    { day:1, hour:13, time:"13:00", name:"Лена И.",    topic:"Квадратные",   stream:"ОГЭ" },
    { day:2, hour:19, time:"19:00", name:"Группа 11А", topic:"Динамика",     stream:"ЕГЭ" },
    { day:3, hour:11, time:"11:00", name:"Катя М.",    topic:"Тригонометрия",stream:"ЕГЭ" },
    { day:3, hour:17, time:"17:00", name:"Артём Б.",   topic:"Статика",      stream:"ЕГЭ" },
    { day:4, hour:15, time:"15:00", name:"Никита О.",  topic:"Дроби",        stream:"ОГЭ" },
    { day:5, hour:12, time:"12:00", name:"Полина С.",  topic:"Логарифмы",    stream:"ЕГЭ" },
  ];
  return (
    <>
      <PageHeader title="Расписание" meta="Неделя 21–27 апреля · 14 занятий · 3 окна" primary={<Button variant="primary" size="md" icon="plus">Новое занятие</Button>} />
      <WeekGrid sessions={week} />
    </>
  );
}

function StudentsRoute({ ctx }) {
  // Controlled by the parent App so crumbs update with the selected student.
  return (
    <StudentsWorkspace
      initialView={ctx.view}
      initialStudentId={ctx.studentId}
      onViewChange={(view, studentId) => ctx.onChange(view, studentId)}
    />
  );
}

function GroupsStub() {
  const group = {
    name: "Группа 11А · физика",
    stream: "ЕГЭ",
    note: "Готовятся к пробнику 28 апреля. Основной фокус — динамика и статика.",
    members: [
      { id:"s1", name:"Маша Коротаева", grade:10, stream:"ЕГЭ", subjects:["физика"], progress:78, lastSession:"18.04", statusTone:"success", statusLabel:"активна" },
      { id:"s5", name:"Катя Морозова",  grade:10, stream:"ЕГЭ", subjects:["физика"], progress:92, lastSession:"18.04", statusTone:"success", statusLabel:"активна" },
      { id:"s4", name:"Артём Белов",    grade:11, stream:"ЕГЭ", subjects:["физика"], progress:41, lastSession:"10.04", statusTone:"danger",  statusLabel:"просрочено" },
      { id:"s8", name:"Данил Киселёв",  grade:10, stream:"ЕГЭ", subjects:["физика"], progress:58, lastSession:"17.04", statusTone:"success", statusLabel:"активен" },
    ],
    sharedHomework: [
      { id:"h1", title:"Кинематика 1D", stream:"ЕГЭ", tasks:8, assigned:4, total:4, due:"22.04", statusTone:"info", statusLabel:"идёт" },
      { id:"h4", title:"Динамика · Ньютон", stream:"ЕГЭ", tasks:12, assigned:4, total:4, due:"26.04", statusTone:"info", statusLabel:"идёт" },
    ],
  };
  return (
    <>
      <PageHeader title="Группы" meta="3 группы · 11 учеников в группах" primary={<Button variant="primary" size="md" icon="plus">Новая группа</Button>} />
      <GroupPanel group={group} />
    </>
  );
}

function MyTasksStub() {
  return (
    <>
      <PageHeader title="Мои задачи" meta="86 авторских задач" primary={<Button variant="primary" size="md" icon="plus">Создать задачу</Button>} />
      <div className="t-section">
        <EmptyState
          title="Здесь будут только ваши задачи"
          body="Авторские задачи, созданные вами. Сейчас вы можете скопировать задачи из общей базы и отредактировать их под себя."
          cta={<Button variant="outline" size="md" icon="library">Открыть базу задач</Button>}
        />
      </div>
    </>
  );
}

function PaymentsStub() {
  const payments = [
    { id:"p1", name:"Маша Коротаева", plan:"8 занятий / мес",  period:"апрель 2026", amount:24000, statusTone:"success", statusLabel:"оплачено", action:"Чек" },
    { id:"p2", name:"Саша Петров",    plan:"4 занятия / мес",  period:"апрель 2026", amount:12000, statusTone:"warning", statusLabel:"ожидает",  action:"Напомнить" },
    { id:"p3", name:"Лена Иванова",   plan:"8 занятий / мес",  period:"апрель 2026", amount:20000, statusTone:"success", statusLabel:"оплачено", action:"Чек" },
    { id:"p4", name:"Артём Белов",    plan:"4 занятия / мес",  period:"апрель 2026", amount:12000, statusTone:"danger",  statusLabel:"долг",     action:"Связаться" },
  ];
  return (
    <>
      <PageHeader title="Платежи" meta="Апрель 2026 · поступило 148 000 ₽ · ожидается 24 000 ₽" primary={<Button variant="primary" size="md" icon="plus">Выставить счёт</Button>} />
      <div className="t-stats" style={{marginBottom:16}}>
        <div className="t-stats__cell"><div className="t-stats__label">Поступило</div><div className="t-stats__value">148 000 ₽</div><div className="t-stats__meta">11 платежей</div></div>
        <div className="t-stats__cell"><div className="t-stats__label">Ожидается</div><div className="t-stats__value">24 000 ₽</div><div className="t-stats__meta">2 ученика</div></div>
        <div className="t-stats__cell"><div className="t-stats__label">Долг</div><div className="t-stats__value">12 000 ₽</div><div className="t-stats__meta">1 ученик</div></div>
        <div className="t-stats__cell"><div className="t-stats__label">Ср. чек / мес</div><div className="t-stats__value">18 500 ₽</div><div className="t-stats__meta">по 28 ученикам</div></div>
      </div>
      <section className="t-section">
        <div className="t-section__header"><h2>Платежи этого месяца</h2><span className="t-section__meta">{payments.length} записей</span></div>
        <hr className="t-divider" />
        {payments.map(p => <PaymentRow key={p.id} p={p} />)}
      </section>
    </>
  );
}

function PlansStub() {
  return (
    <>
      <PageHeader title="Тарифы" meta="Управление пакетами занятий" primary={<Button variant="primary" size="md" icon="plus">Новый тариф</Button>} />
      <div className="t-grid-3">
        {[
          { name:"4 занятия / мес",  price:"12 000 ₽", who:"12 учеников" },
          { name:"8 занятий / мес",  price:"20 000 ₽", who:"14 учеников" },
          { name:"Индивидуальный",    price:"по запросу", who:"2 ученика" },
        ].map(pl => (
          <div key={pl.name} className="t-card">
            <div className="t-card__body">
              <div className="t-card__title" style={{marginBottom:4}}>{pl.name}</div>
              <div className="t-muted" style={{fontSize:13, marginBottom:10}}>{pl.who}</div>
              <div className="t-num" style={{fontSize:22, fontWeight:600}}>{pl.price}</div>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

function App() {
  // state persisted to localStorage
  const initial = (() => {
    try {
      const saved = localStorage.getItem("sokrat.tutor.state");
      if (saved) return JSON.parse(saved);
    } catch(e){}
    return { route:"students", studentsView:"list", studentId:null };
  })();
  const [route, setRoute] = useState(ROUTES[initial.route] ? initial.route : "students");
  const [studentsView, setStudentsView] = useState(initial.studentsView || "list");
  const [studentId, setStudentId] = useState(initial.studentId || null);

  useEffect(() => {
    try { localStorage.setItem("sokrat.tutor.state", JSON.stringify({ route, studentsView, studentId })); } catch(e){}
  }, [route, studentsView, studentId]);

  // Re-init lucide icons
  useEffect(() => {
    const t = setTimeout(() => {
      if (window.lucide && window.lucide.createIcons) {
        try { window.lucide.createIcons(); } catch(e) {}
      }
    }, 30);
    return () => clearTimeout(t);
  }, [route, studentsView, studentId]);

  const r = ROUTES[route] || ROUTES.students;

  // Dynamic crumbs for students
  let crumbs = r.crumbs;
  if (route === "students" && studentsView === "split" && studentId) {
    const s = (window.STUDENTS_DATA || []).find(x => x.id === studentId);
    if (s) crumbs = ["Сократ", "Ученики", s.name];
  }

  const ctx = {
    view: studentsView,
    studentId,
    onChange: (view, sid) => { setStudentsView(view); setStudentId(sid); },
    goStudent: (sid) => { setRoute("students"); setStudentsView("split"); setStudentId(sid); },
    goStudents: () => { setRoute("students"); setStudentsView("list"); setStudentId(null); },
    goHomework: (chat) => { setRoute("homeworkDetail"); },
  };

  return (
    <AppFrame
      side={<SideNav active={NAV_KEY_FOR[route]} onNavigate={(id) => {
        setRoute(id);
        // when returning to Students via side nav, stay on whatever they had
      }} />}
      top={<TopBar crumbs={crumbs} />}
    >
      {r.render(ctx)}
    </AppFrame>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
