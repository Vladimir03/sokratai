<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сократ — Guided Homework Prototype</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        socrat: { DEFAULT: '#1B6B4A', light: '#e8f5ee' },
        stone: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e3', 300: '#d6d3d1', 700: '#44403c', 800: '#292524' },
        indigo: { 50: '#eef2ff', 600: '#4f46e5', 700: '#4338ca' },
        emerald: { 50: '#ecfdf5', 200: '#a7f3d0', 600: '#059669' },
        green: { 50: '#f0fdf4', 100: '#dcfce7', 600: '#16a34a', 700: '#15803d' },
        amber: { 50: '#fffbeb', 600: '#d97706' },
        red: { 50: '#fef2f2', 600: '#dc2626' },
        slate: { 100: '#f1f5f9', 200: '#e2e8f0', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155' },
      },
      fontFamily: {
        display: ['Georgia', 'Cambria', 'serif'],
        body: ['"Segoe UI"', 'system-ui', '-apple-system', 'sans-serif'],
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; margin: 0; }
  .font-display { font-family: Georgia, Cambria, serif; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes typing { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
  .typing-dot { animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  textarea { font-family: inherit; }
  /* Scrollbar */
  .chat-scroll::-webkit-scrollbar { width: 4px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ═══════════════════════════════════════════════════
   DESIGN TOKENS (from actual SokratAI codebase)
   ═══════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════
   DEMO DATA — simulated tasks & AI conversations
   ═══════════════════════════════════════════════════ */

const TASKS = [
  {
    id: 1,
    order: 1,
    text: "Тело брошено вертикально вверх с начальной скоростью v₀ = 20 м/с. Определите максимальную высоту подъёма. Сопротивлением воздуха пренебречь. g = 10 м/с².",
    answer: "20",
    unit: "м",
    status: "active",
  },
  {
    id: 2,
    order: 2,
    text: "Автомобиль массой m = 1500 кг движется со скоростью v = 72 км/ч. Определите кинетическую энергию автомобиля.",
    answer: "300000",
    unit: "Дж",
    status: "active",
  },
  {
    id: 3,
    order: 3,
    text: "Определите период колебаний математического маятника длиной L = 1 м. g = 10 м/с², π² ≈ 10.",
    answer: "2",
    unit: "с",
    status: "locked",
  },
];

// S1-1: Structured bootstrap (Дано / Найти / Ситуация)
const BOOTSTRAP_MSG = {
  role: "ai",
  kind: "system",
  label: "Введение",
  parts: [
    { type: "section", title: "Дано", content: "v₀ = 20 м/с\ng = 10 м/с²\nСопротивление воздуха = 0" },
    { type: "section", title: "Найти", content: "h_max — максимальная высота подъёма" },
    { type: "section", title: "Ситуация", content: "Тело летит вверх и замедляется под действием силы тяжести. В верхней точке скорость = 0. Это классическая задача на кинематику равнозамедленного движения." },
    { type: "nudge", content: "Какую формулу связывает скорость, ускорение и перемещение без времени?" },
  ],
};

// Conversation scenarios for different S1 sub-jobs
const SCENARIOS = {
  // S1-2: Choose approach — progressive hint ladder
  hint_1: {
    role: "ai", kind: "hint",
    text: "Подсказка: подумай, какая величина равна нулю в верхней точке подъёма. Это ключ к выбору формулы.",
  },
  hint_2: {
    role: "ai", kind: "hint",
    text: "Подсказка (подробнее): в верхней точке v = 0. Тебе нужна формула, которая связывает v₀, v, g и h — без времени. Вспомни формулы кинематики равноускоренного движения.",
  },
  hint_3: {
    role: "ai", kind: "hint",
    text: "Подсказка (конкретная): используй формулу v² = v₀² − 2gh. Подставь v = 0 и вырази h.",
  },
  // S1-3: Step check via discussion
  step_check_correct: {
    role: "ai", kind: "ai_reply",
    text: "✅ Шаг верный! v² = v₀² − 2gh — это правильная формула для этой задачи. Теперь подставь v = 0 в верхней точке и вырази h.",
  },
  step_check_wrong: {
    role: "ai", kind: "ai_reply",
    text: "⚠️ Почти! Формула s = v₀t + at²/2 тоже работает, но для неё нужно знать время. А у нас его нет в условии. Попробуй формулу без времени: v² = v₀² − 2gh.",
  },
  // S1-4: Error with analogy + summary after correction
  wrong_answer: {
    role: "ai", kind: "answer_verdict",
    verdict: "incorrect",
    text: "Не совсем. Ты получил 40 м — похоже, забыл разделить на 2.\n\nАналогия: представь, что ты тормозишь на велосипеде. Тормозной путь зависит от квадрата скорости — но формула h = v₀²/(2g), а не v₀²/g. Двойка в знаменателе — из-за того, что торможение равномерное, и средняя скорость = половина начальной.\n\nПопробуй пересчитать: h = v₀² / (2g).",
  },
  correct_answer: {
    role: "ai", kind: "answer_verdict",
    verdict: "correct",
    text: "✅ Верно! h = 20 м.\n\nРазбор ошибки: в прошлый раз ты использовал h = v₀²/g = 40 м, без деления на 2. Запомни паттерн: когда тело равномерно замедляется, перемещение = v₀²/(2g). Двойка появляется потому, что средняя скорость при равномерном торможении — половина начальной.",
  },
  // AI suggests next action (R3)
  suggest_after_correct: {
    role: "ai", kind: "ai_reply",
    text: "Отлично! Задача решена. Переходи к следующей задаче — там кинетическая энергия, тоже полезная тема для ЕГЭ.",
  },
};

/* ═══════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════ */
function Navigation() {
  const tabs = ["Домашка", "Чат", "Тренажёр", "Прогресс"];
  const [active, setActive] = useState(0);
  return (
    <nav className="h-14 bg-white border-b border-stone-200 flex items-center px-3 gap-2">
      <a href="#" className="flex items-center gap-1.5 mr-2 flex-shrink-0">
        <div className="w-7 h-7 bg-socrat rounded-md flex items-center justify-center">
          <span className="text-white font-bold text-sm">S</span>
        </div>
        <span className="hidden md:inline font-display text-socrat font-semibold text-base">Сократ</span>
      </a>
      <div className="flex gap-1 overflow-x-auto">
        {tabs.map((tab, i) => (
          <button
            key={tab}
            onClick={() => setActive(i)}
            className={`px-3 py-1.5 text-sm rounded-md whitespace-nowrap transition-colors ${
              i === active
                ? "bg-indigo-50 text-indigo-600 font-medium"
                : "text-slate-600 hover:bg-stone-100"
            }`}
          >
            {tab}
          </button>
        ))}
      </div>
      <div className="ml-auto flex-shrink-0">
        <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-medium">
          АИ
        </div>
      </div>
    </nav>
  );
}

/* ═══════════════════════════════════════════════════
   TASK STEPPER — horizontal circles
   ═══════════════════════════════════════════════════ */
function TaskStepper({ tasks, current, onSelect }) {
  return (
    <div className="flex items-center gap-2 px-3 py-2 bg-white border-b border-stone-200">
      <span className="text-xs text-slate-500 mr-1 hidden md:inline">Задачи:</span>
      {tasks.map((task) => {
        const isCurrent = task.order === current;
        const isCompleted = task.status === "completed";
        let bgClass = "bg-white border-stone-300 text-stone-700";
        if (isCurrent) bgClass = "bg-indigo-600 border-indigo-600 text-white ring-2 ring-indigo-200";
        else if (isCompleted) bgClass = "bg-green-600 border-green-600 text-white";
        return (
          <button
            key={task.id}
            onClick={() => onSelect(task.order)}
            className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm font-medium transition-all ${bgClass}`}
          >
            {isCompleted ? "✓" : task.order}
          </button>
        );
      })}
      <div className="ml-auto text-xs text-slate-400">
        {tasks.filter(t => t.status === "completed").length}/{tasks.length}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   TASK CONDITION — collapsible
   ═══════════════════════════════════════════════════ */
function TaskCondition({ task, expanded, onToggle }) {
  return (
    <div className="bg-white border-b border-stone-200">
      <button
        onClick={onToggle}
        className="w-full flex items-center justify-between px-4 py-2.5 text-left"
      >
        <span className="text-sm font-medium text-stone-800">
          Задача {task.order}
        </span>
        <svg
          className={`w-4 h-4 text-slate-400 transition-transform ${expanded ? "rotate-180" : ""}`}
          fill="none" viewBox="0 0 24 24" stroke="currentColor"
        >
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div
        className={`overflow-hidden transition-all duration-200 ${
          expanded ? "max-h-96 opacity-100" : "max-h-0 opacity-0"
        }`}
      >
        <div className="px-4 pb-3 text-sm text-stone-700 whitespace-pre-wrap leading-relaxed">
          {task.text}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   CHAT MESSAGE BUBBLE
   ═══════════════════════════════════════════════════ */
function ChatMessage({ msg, isNew }) {
  const isUser = msg.role === "user";
  const isAi = msg.role === "ai";

  // Verdict styling
  let verdictBanner = null;
  if (msg.kind === "answer_verdict") {
    const isCorrect = msg.verdict === "correct";
    verdictBanner = (
      <div className={`flex items-center gap-2 mb-2 px-3 py-1.5 rounded-lg text-sm font-medium ${
        isCorrect ? "bg-green-50 text-green-700" : "bg-red-50 text-red-600"
      }`}>
        <span>{isCorrect ? "✅" : "❌"}</span>
        <span>{isCorrect ? "Правильно!" : "Неправильно"}</span>
      </div>
    );
  }

  // Label badge
  let labelBadge = null;
  if (msg.label) {
    labelBadge = (
      <span className="inline-block mb-1 px-2 py-0.5 text-xs rounded-full bg-indigo-50 text-indigo-600 font-medium">
        {msg.label}
      </span>
    );
  }
  if (msg.kind === "hint") {
    labelBadge = (
      <span className="inline-block mb-1 px-2 py-0.5 text-xs rounded-full bg-amber-50 text-amber-600 font-medium">
        Подсказка
      </span>
    );
  }

  // Bootstrap structured message
  if (msg.parts) {
    return (
      <div className={`flex mb-3 ${isNew ? "animate-fade-in" : ""}`}>
        <div className="max-w-[85%] md:max-w-[75%]">
          {labelBadge}
          <div className="bg-stone-100 rounded-2xl rounded-bl-md px-4 py-3 space-y-2.5">
            {msg.parts.map((part, i) => {
              if (part.type === "section") {
                return (
                  <div key={i}>
                    <div className="text-xs font-semibold text-socrat uppercase tracking-wide mb-0.5">
                      {part.title}
                    </div>
                    <div className="text-sm text-stone-700 whitespace-pre-wrap">{part.content}</div>
                  </div>
                );
              }
              if (part.type === "nudge") {
                return (
                  <div key={i} className="mt-1 pt-2 border-t border-stone-200">
                    <div className="text-sm text-indigo-600 font-medium italic">
                      💡 {part.content}
                    </div>
                  </div>
                );
              }
              return null;
            })}
          </div>
        </div>
      </div>
    );
  }

  // Regular messages
  if (isUser) {
    return (
      <div className={`flex justify-end mb-3 ${isNew ? "animate-fade-in" : ""}`}>
        <div className="max-w-[85%] md:max-w-[75%]">
          {msg.kind === "answer_attempt" && (
            <div className="text-right mb-1">
              <span className="inline-block px-2 py-0.5 text-xs rounded-full bg-green-50 text-green-600 font-medium">
                Ответ
              </span>
            </div>
          )}
          <div className="bg-indigo-600 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm">
            {msg.text}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className={`flex mb-3 ${isNew ? "animate-fade-in" : ""}`}>
      <div className="max-w-[85%] md:max-w-[75%]">
        {labelBadge}
        {verdictBanner}
        <div className="bg-stone-100 rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-stone-800 whitespace-pre-wrap leading-relaxed">
          {msg.text}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   TYPING INDICATOR
   ═══════════════════════════════════════════════════ */
function TypingIndicator() {
  return (
    <div className="flex mb-3 animate-fade-in">
      <div className="bg-stone-100 rounded-2xl rounded-bl-md px-4 py-3 flex gap-1">
        <span className="w-2 h-2 bg-stone-400 rounded-full typing-dot"></span>
        <span className="w-2 h-2 bg-stone-400 rounded-full typing-dot"></span>
        <span className="w-2 h-2 bg-stone-400 rounded-full typing-dot"></span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SCORE INDICATOR
   ═══════════════════════════════════════════════════ */
function ScoreIndicator({ wrongCount, hintCount }) {
  const maxScore = 2;
  const penalty = 0.1 * (wrongCount + hintCount);
  const multiplier = Math.max(0.5, 1 - penalty);
  const available = (maxScore * multiplier).toFixed(1);
  const percent = Math.round(multiplier * 100);
  return (
    <div className="flex items-center gap-2 text-xs text-slate-500 px-1">
      <div className="flex items-center gap-1">
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
        </svg>
        <span>{available}/{maxScore} б.</span>
      </div>
      <div className="w-16 h-1.5 bg-stone-200 rounded-full overflow-hidden">
        <div
          className="h-full rounded-full transition-all duration-500"
          style={{
            width: `${percent}%`,
            backgroundColor: percent > 70 ? '#16a34a' : percent > 50 ? '#d97706' : '#dc2626',
          }}
        ></div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   CHAT INPUT — Two fields (Answer + Discussion)
   ═══════════════════════════════════════════════════ */
function ChatInput({ onSendAnswer, onSendStep, onHint, disabled, isCompleted }) {
  const [answerText, setAnswerText] = useState("");
  const [discussionText, setDiscussionText] = useState("");
  const [isDiscussionExpanded, setIsDiscussionExpanded] = useState(false);
  const answerRef = useRef(null);

  const handleAnswerKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey && answerText.trim()) {
      e.preventDefault();
      onSendAnswer(answerText.trim());
      setAnswerText("");
    }
  };

  const handleDiscussionKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey && discussionText.trim()) {
      e.preventDefault();
      onSendStep(discussionText.trim());
      setDiscussionText("");
    }
  };

  if (isCompleted) {
    return (
      <div className="p-3 bg-green-50 border-t border-green-200 text-center">
        <p className="text-sm text-green-700 font-medium">✅ Задача решена</p>
      </div>
    );
  }

  return (
    <div className="bg-white border-t border-stone-200 p-2 md:p-3 space-y-2">
      {/* Answer field */}
      <div className="flex items-center gap-2">
        <div className="flex-1 flex items-center border-2 border-green-600 rounded-xl px-3 py-1.5 bg-green-50/30 focus-within:ring-2 focus-within:ring-green-200">
          <textarea
            ref={answerRef}
            value={answerText}
            onChange={e => setAnswerText(e.target.value)}
            onKeyDown={handleAnswerKeyDown}
            placeholder="Ответ..."
            disabled={disabled}
            rows={1}
            className="flex-1 resize-none bg-transparent text-sm outline-none placeholder:text-slate-400 text-base"
            style={{ fontSize: '16px' }}
          />
        </div>
        <button
          onClick={() => { if (answerText.trim()) { onSendAnswer(answerText.trim()); setAnswerText(""); } }}
          disabled={disabled || !answerText.trim()}
          className="h-8 md:h-10 px-3 md:px-4 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-medium disabled:opacity-40 transition-colors"
          style={{ touchAction: 'manipulation' }}
        >
          Проверить
        </button>
        <button
          onClick={onHint}
          disabled={disabled}
          className="h-8 md:h-10 w-8 md:w-10 flex items-center justify-center rounded-xl border border-amber-300 bg-amber-50 hover:bg-amber-100 text-amber-600 transition-colors disabled:opacity-40"
          style={{ touchAction: 'manipulation' }}
          title="Подсказка"
        >
          💡
        </button>
      </div>

      {/* Discussion toggle */}
      <button
        onClick={() => setIsDiscussionExpanded(!isDiscussionExpanded)}
        className="flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 transition-colors px-1"
        style={{ touchAction: 'manipulation' }}
      >
        <svg
          className={`w-3 h-3 transition-transform ${isDiscussionExpanded ? "rotate-180" : ""}`}
          fill="none" viewBox="0 0 24 24" stroke="currentColor"
        >
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
        </svg>
        Обсудить с AI
      </button>

      {/* Discussion field */}
      <div className={`overflow-hidden transition-all duration-200 ${
        isDiscussionExpanded ? "max-h-96 opacity-100" : "max-h-0 opacity-0"
      }`}>
        <div className="flex items-center gap-2">
          <div className="flex-1 flex items-center border border-slate-200 rounded-xl px-3 py-1.5 focus-within:ring-2 focus-within:ring-indigo-200">
            <textarea
              value={discussionText}
              onChange={e => setDiscussionText(e.target.value)}
              onKeyDown={handleDiscussionKeyDown}
              placeholder="Обсуди с AI..."
              disabled={disabled}
              rows={1}
              className="flex-1 resize-none bg-transparent text-sm outline-none placeholder:text-slate-400"
              style={{ fontSize: '16px' }}
            />
          </div>
          <button
            onClick={() => { if (discussionText.trim()) { onSendStep(discussionText.trim()); setDiscussionText(""); } }}
            disabled={disabled || !discussionText.trim()}
            className="h-8 md:h-10 px-3 md:px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium disabled:opacity-40 transition-colors"
            style={{ touchAction: 'manipulation' }}
          >
            Написать
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SCENARIO SIDEBAR — pick demo scenario
   ═══════════════════════════════════════════════════ */
function ScenarioPanel({ onRun, activeScenario }) {
  const scenarios = [
    { id: "bootstrap", label: "S1-1: Структурный Bootstrap", desc: "AI разбирает условие: Дано / Найти / Ситуация + наводящий вопрос" },
    { id: "hints", label: "S1-2: Прогрессивные подсказки", desc: "3 уровня: общая → конкретнее → формула. Подсказки всё точнее" },
    { id: "step_check", label: "S1-3: Проверка шага", desc: "Ученик пишет промежуточный шаг, AI даёт ✅ или ⚠️" },
    { id: "error_flow", label: "S1-4: Ошибка + аналогия", desc: "Неверный ответ → AI объясняет через аналогию → верный → резюме ошибки" },
    { id: "full_flow", label: "Полный сценарий", desc: "Bootstrap → подсказка → шаг → ошибка → исправление" },
  ];

  return (
    <div className="bg-indigo-50/50 border-b border-indigo-100 px-3 py-2">
      <div className="text-xs font-semibold text-indigo-600 mb-1.5 uppercase tracking-wide">
        Демо-сценарии (PRD S1)
      </div>
      <div className="flex gap-1.5 overflow-x-auto pb-1">
        {scenarios.map(s => (
          <button
            key={s.id}
            onClick={() => onRun(s.id)}
            className={`flex-shrink-0 px-2.5 py-1 text-xs rounded-lg border transition-colors ${
              activeScenario === s.id
                ? "bg-indigo-600 text-white border-indigo-600"
                : "bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50"
            }`}
            title={s.desc}
          >
            {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════ */
function App() {
  const [tasks, setTasks] = useState(TASKS);
  const [currentTask, setCurrentTask] = useState(1);
  const [conditionExpanded, setConditionExpanded] = useState(true);
  const [messages, setMessages] = useState([]);
  const [isTyping, setIsTyping] = useState(false);
  const [activeScenario, setActiveScenario] = useState(null);
  const [wrongCount, setWrongCount] = useState(0);
  const [hintCount, setHintCount] = useState(0);
  const chatRef = useRef(null);

  const scrollToBottom = useCallback(() => {
    if (chatRef.current) {
      setTimeout(() => {
        chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, 50);
    }
  }, []);

  useEffect(() => { scrollToBottom(); }, [messages, isTyping]);

  const addAiMessage = (msg, delay = 800) => {
    return new Promise(resolve => {
      setIsTyping(true);
      setTimeout(() => {
        setIsTyping(false);
        setMessages(prev => [...prev, { ...msg, isNew: true }]);
        resolve();
      }, delay);
    });
  };

  const addUserMessage = (text, kind = "discussion") => {
    setMessages(prev => [...prev, { role: "user", text, kind, isNew: true }]);
  };

  const resetChat = () => {
    setMessages([]);
    setWrongCount(0);
    setHintCount(0);
    setTasks(TASKS.map(t => ({ ...t, status: t.order <= 2 ? "active" : "locked" })));
    setCurrentTask(1);
    setConditionExpanded(true);
  };

  // Run demo scenario
  const runScenario = async (id) => {
    resetChat();
    setActiveScenario(id);

    if (id === "bootstrap") {
      await addAiMessage(BOOTSTRAP_MSG, 1000);
    }

    if (id === "hints") {
      await addAiMessage(BOOTSTRAP_MSG, 800);
      // User asks for hint
      await new Promise(r => setTimeout(r, 600));
      addUserMessage("Не знаю с чего начать", "hint_request");
      await addAiMessage(SCENARIOS.hint_1, 1000);
      setHintCount(1);
      // Second hint
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("Всё равно не понимаю какую формулу взять", "hint_request");
      await addAiMessage(SCENARIOS.hint_2, 1200);
      setHintCount(2);
      // Third hint
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("Подскажи формулу", "hint_request");
      await addAiMessage(SCENARIOS.hint_3, 1000);
      setHintCount(3);
    }

    if (id === "step_check") {
      await addAiMessage(BOOTSTRAP_MSG, 800);
      // User checks a correct step
      await new Promise(r => setTimeout(r, 600));
      addUserMessage("Проверь мой шаг: использую v² = v₀² − 2gh", "discussion");
      await addAiMessage(SCENARIOS.step_check_correct, 900);
      // User checks a wrong step
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("А если взять s = v₀t + at²/2?", "discussion");
      await addAiMessage(SCENARIOS.step_check_wrong, 1000);
    }

    if (id === "error_flow") {
      await addAiMessage(BOOTSTRAP_MSG, 800);
      // Wrong answer
      await new Promise(r => setTimeout(r, 600));
      addUserMessage("40", "answer_attempt");
      setWrongCount(1);
      await addAiMessage(SCENARIOS.wrong_answer, 1200);
      // Correct answer
      await new Promise(r => setTimeout(r, 800));
      addUserMessage("20", "answer_attempt");
      await addAiMessage(SCENARIOS.correct_answer, 1000);
      // Mark completed
      setTasks(prev => prev.map(t => t.order === 1 ? { ...t, status: "completed" } : t));
      // Suggest next
      await addAiMessage(SCENARIOS.suggest_after_correct, 800);
    }

    if (id === "full_flow") {
      // Bootstrap
      await addAiMessage(BOOTSTRAP_MSG, 1000);
      // Hint 1
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("Не знаю какую формулу взять", "hint_request");
      await addAiMessage(SCENARIOS.hint_1, 900);
      setHintCount(1);
      // Step check
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("Проверь: v² = v₀² − 2gh, подставляю v=0", "discussion");
      await addAiMessage(SCENARIOS.step_check_correct, 900);
      // Wrong answer
      await new Promise(r => setTimeout(r, 500));
      addUserMessage("40", "answer_attempt");
      setWrongCount(1);
      await addAiMessage(SCENARIOS.wrong_answer, 1200);
      // Correct
      await new Promise(r => setTimeout(r, 700));
      addUserMessage("20", "answer_attempt");
      await addAiMessage(SCENARIOS.correct_answer, 1000);
      setTasks(prev => prev.map(t => t.order === 1 ? { ...t, status: "completed" } : t));
      await addAiMessage(SCENARIOS.suggest_after_correct, 700);
    }
  };

  const handleSendAnswer = async (text) => {
    addUserMessage(text, "answer_attempt");
    setIsTyping(true);
    setTimeout(() => {
      setIsTyping(false);
      if (text === "20") {
        setMessages(prev => [...prev, { ...SCENARIOS.correct_answer, isNew: true }]);
        setTasks(prev => prev.map(t => t.order === currentTask ? { ...t, status: "completed" } : t));
      } else {
        setWrongCount(c => c + 1);
        setMessages(prev => [...prev, { ...SCENARIOS.wrong_answer, isNew: true }]);
      }
    }, 1000);
  };

  const handleSendStep = async (text) => {
    addUserMessage(text, "discussion");
    setIsTyping(true);
    const isStepCheck = /проверь|правильно|верно|мой шаг|шаг/i.test(text);
    setTimeout(() => {
      setIsTyping(false);
      if (isStepCheck) {
        setMessages(prev => [...prev, { ...SCENARIOS.step_check_correct, isNew: true }]);
      } else {
        setMessages(prev => [...prev, {
          role: "ai", kind: "ai_reply", isNew: true,
          text: "Хороший вопрос! Давай разберём: в этой задаче ключевое — что в верхней точке скорость равна нулю. Это даёт нам уравнение с одним неизвестным.",
        }]);
      }
    }, 900);
  };

  const handleHint = async () => {
    const h = hintCount;
    setHintCount(h + 1);
    addUserMessage("Подсказка", "hint_request");
    const hintKey = h === 0 ? "hint_1" : h === 1 ? "hint_2" : "hint_3";
    await addAiMessage(SCENARIOS[hintKey] || SCENARIOS.hint_3, 900);
  };

  const task = tasks.find(t => t.order === currentTask);
  const isCompleted = task?.status === "completed";

  return (
    <div className="h-screen flex flex-col bg-stone-50" style={{ maxHeight: '100dvh' }}>
      <Navigation />

      {/* Scenario panel — prototype only */}
      <ScenarioPanel onRun={runScenario} activeScenario={activeScenario} />

      {/* Assignment header */}
      <div className="bg-white border-b border-stone-200 px-4 py-2 flex items-center justify-between">
        <div>
          <h1 className="text-sm font-semibold text-stone-800">Кинематика — вертикальное движение</h1>
          <p className="text-xs text-slate-500">Физика · 3 задачи · guided mode</p>
        </div>
        <ScoreIndicator wrongCount={wrongCount} hintCount={hintCount} />
      </div>

      <TaskStepper tasks={tasks} current={currentTask} onSelect={setCurrentTask} />
      <TaskCondition task={task} expanded={conditionExpanded} onToggle={() => setConditionExpanded(!conditionExpanded)} />

      {/* Chat area */}
      <div ref={chatRef} className="flex-1 overflow-y-auto chat-scroll px-3 py-3">
        {messages.length === 0 && !isTyping && (
          <div className="flex flex-col items-center justify-center h-full text-center px-4">
            <div className="w-12 h-12 bg-socrat/10 rounded-full flex items-center justify-center mb-3">
              <span className="text-2xl">🎯</span>
            </div>
            <p className="text-sm text-slate-500 max-w-xs">
              Выбери сценарий сверху или начни решать — AI поможет разобраться в задаче
            </p>
          </div>
        )}
        {messages.map((msg, i) => (
          <ChatMessage key={i} msg={msg} isNew={msg.isNew} />
        ))}
        {isTyping && <TypingIndicator />}
      </div>

      {/* Input */}
      <ChatInput
        onSendAnswer={handleSendAnswer}
        onSendStep={handleSendStep}
        onHint={handleHint}
        disabled={isTyping}
        isCompleted={isCompleted}
      />

      {/* Prev/Next */}
      <div className="bg-white border-t border-stone-200 px-3 py-1.5 flex justify-between">
        <button
          onClick={() => setCurrentTask(Math.max(1, currentTask - 1))}
          disabled={currentTask === 1}
          className="h-8 px-3 text-xs text-slate-600 border border-stone-200 rounded-lg hover:bg-stone-50 disabled:opacity-30 flex items-center gap-1"
        >
          ← <span className="hidden md:inline">Предыдущая</span>
        </button>
        <button
          onClick={() => { resetChat(); setCurrentTask(Math.min(3, currentTask + 1)); }}
          disabled={currentTask === 3}
          className="h-8 px-3 text-xs text-slate-600 border border-stone-200 rounded-lg hover:bg-stone-50 disabled:opacity-30 flex items-center gap-1"
        >
          <span className="hidden md:inline">Следующая</span> →
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
