<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сократ — AI-загрузка задач (прототип)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary:#1E293B; --accent:#1B6B4A; --accent-d:#14543A; --accent-lt:#DCFCE7;
    --warning:#B45309; --warning-bg:#FEF3C7; --warning-bd:#FCD34D;
    --danger:#B91C1C; --danger-bg:#FEE2E2; --danger-bd:#FCA5A5;
    --surface:#FFFFFF; --bg:#F1F5F9; --text1:#0F172A; --text2:#64748B; --text3:#94A3B8;
    --border:#E2E8F0; --border-d:#CBD5E1; --folder:#5B5FC7; --folder-bg:#F3F2FB; --orange:#E8913A;
    --radius:12px; --radius-sm:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Golos Text',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text1); line-height:1.5;
    -webkit-font-smoothing:antialiased; padding-bottom:48px;
  }
  .ico{display:inline-block;vertical-align:-2px;}
  .topbar{display:flex;align-items:center;gap:14px;height:56px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;}
  .logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:18px;color:var(--primary);}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .crumb{color:var(--text2);font-size:14px;display:flex;align-items:center;gap:8px;}
  .crumb b{color:var(--text1);font-weight:500;}
  .topbar .spacer{flex:1;}
  .quota{font-size:13px;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:5px 10px;border-radius:999px;display:flex;align-items:center;gap:6px;}
  .quota b{color:var(--accent);font-weight:600;}

  .wrap{max-width:880px;margin:24px auto;padding:0 20px;}

  /* ===== Home / Моя база ===== */
  .home-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .home-head h1{margin:0;font-size:24px;font-weight:600;}
  .home-head p{margin:5px 0 0;color:var(--text2);font-size:14px;}
  .home-actions{display:flex;gap:10px;align-items:center;}
  .entry-banner{display:flex;align-items:center;gap:13px;background:linear-gradient(0deg,var(--accent-lt),var(--accent-lt));border:1px solid #BBE9CF;border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;}
  .entry-banner .eb-ic{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .entry-banner .eb-txt{flex:1;font-size:14px;color:var(--accent-d);}
  .entry-banner .eb-txt b{font-weight:600;}
  .entry-banner .eb-cta{background:var(--accent);color:#fff;border:none;font:inherit;font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:7px;}
  .entry-banner .eb-cta:hover{background:var(--accent-d);}

  .section-label{font-size:13px;color:var(--text2);font-weight:500;margin:0 0 10px;text-transform:none;}
  .folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:22px;}
  .folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .2s,border-color .2s;}
  .folder-card:hover{box-shadow:0 4px 14px rgba(15,23,42,.07);border-color:var(--border-d);}
  .folder-card .fic{width:38px;height:38px;border-radius:10px;background:var(--folder-bg);color:var(--folder);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .folder-card .fname{font-weight:500;font-size:15px;}
  .folder-card .fcount{font-size:12.5px;color:var(--text2);}
  .folder-card.add{border-style:dashed;color:var(--text2);justify-content:center;}
  .alt-entry{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);background:var(--surface);border:1px dashed var(--border-d);border-radius:var(--radius);padding:12px 14px;}
  .alt-entry .mini-mock{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;color:var(--text1);}
  .alt-entry .ai-pill{display:inline-flex;align-items:center;gap:5px;background:var(--accent-lt);color:var(--accent-d);border:1px solid #BBE9CF;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:500;}

  .back{background:none;border:none;color:var(--text2);font:inherit;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:0;margin-bottom:14px;}
  .back:hover{color:var(--accent);}

  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .panel-head{padding:18px 22px;border-bottom:1px solid var(--border);}
  .panel-head h1{margin:0;font-size:20px;font-weight:600;display:flex;align-items:center;gap:10px;}
  .panel-head .ai-badge{color:var(--accent);}
  .panel-head p{margin:6px 0 0;color:var(--text2);font-size:14px;}
  .panel-body{padding:22px;}

  .toolrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .folder-chip{display:inline-flex;align-items:center;gap:8px;background:var(--folder-bg);color:var(--folder);border:1px solid #DDDcF5;border-radius:999px;padding:7px 12px;font-size:14px;font-weight:500;cursor:pointer;}
  .folder-chip select{border:none;background:transparent;color:var(--folder);font:inherit;font-weight:500;cursor:pointer;outline:none;}
  .tabs{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;gap:2px;}
  .tab{display:inline-flex;align-items:center;gap:7px;border:none;background:transparent;color:var(--text2);font:inherit;font-size:14px;padding:7px 13px;border-radius:6px;cursor:pointer;}
  .tab.active{background:var(--surface);color:var(--text1);font-weight:500;box-shadow:0 1px 2px rgba(15,23,42,.08);}

  .dropzone{border:1.5px dashed var(--border-d);border-radius:var(--radius);background:#FBFCFE;padding:18px;}
  textarea.material{width:100%;min-height:120px;border:none;background:transparent;resize:vertical;font:inherit;font-size:16px;color:var(--text1);outline:none;line-height:1.6;}
  textarea.material::placeholder{color:var(--text3);}
  .filechip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .filechip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 10px 5px 8px;font-size:13px;color:var(--text2);}
  .filechip .thumb{width:22px;height:22px;border-radius:5px;background:#E7EEF9;color:#3F6CB0;display:flex;align-items:center;justify-content:center;}
  .filechip .rm{cursor:pointer;color:var(--text3);display:flex;}
  .photo-dz,.pdf-dz{display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:26px 16px;color:var(--text2);}
  .photo-dz .big,.pdf-dz .big{width:48px;height:48px;border-radius:14px;background:var(--accent-lt);color:var(--accent-d);display:flex;align-items:center;justify-content:center;}
  .pdf-dz .book-note{font-size:12.5px;color:var(--accent-d);background:var(--accent-lt);border-radius:999px;padding:4px 11px;}
  .ghost-btn{background:var(--surface);border:1px solid var(--border-d);color:var(--text1);font:inherit;font-size:14px;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .ghost-btn:hover{background:var(--bg);}

  .actions{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap;}
  .btn-primary{background:var(--accent);color:#fff;border:none;font:inherit;font-size:15px;font-weight:600;padding:11px 20px;border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:9px;}
  .btn-primary:hover{background:var(--accent-d);}
  .btn-primary:disabled{background:#A7B0BC;cursor:default;}
  .link-btn{background:none;border:none;color:var(--accent);font:inherit;font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .hint-text{color:var(--text3);font-size:13px;margin-left:auto;}

  .proc{padding:8px 4px;}
  .proc-step{display:flex;align-items:center;gap:12px;padding:10px 0;color:var(--text3);font-size:15px;transition:color .3s;}
  .proc-step .mk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-d);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .proc-step.run{color:var(--text1);}
  .proc-step.run .mk{border-color:var(--accent);}
  .proc-step.done{color:var(--text2);}
  .proc-step.done .mk{background:var(--accent);border-color:var(--accent);color:#fff;}
  .spinner{width:14px;height:14px;border:2px solid var(--accent);border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .summary{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .summary .lead{font-size:15px;font-weight:600;}
  .pill{font-size:12.5px;font-weight:500;padding:3px 10px;border-radius:999px;}
  .pill.warn{background:var(--warning-bg);color:var(--warning);}
  .pill.ok{background:var(--accent-lt);color:var(--accent-d);}
  .pill.topic{background:var(--folder-bg);color:var(--folder);}
  .legend{margin-left:auto;display:flex;gap:14px;font-size:12.5px;color:var(--text2);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .cdot{width:9px;height:9px;border-radius:50%;}
  .cdot.hi{background:var(--accent);} .cdot.lo{background:var(--warning-bd);}

  .card{border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;background:var(--surface);transition:box-shadow .2s,border-color .2s,opacity .25s,transform .25s;}
  .card.flash{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
  .card.dup{background:#FFFCFB;border-color:var(--warning-bd);}
  .card.off{opacity:.5;}
  .card.removing{opacity:0;transform:translateY(-6px);}
  .card.saved{border-color:var(--accent);background:#FAFEFB;}
  .card-top{display:flex;align-items:flex-start;gap:12px;}
  .chk{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid var(--border-d);border-radius:6px;cursor:pointer;flex:0 0 auto;margin-top:2px;position:relative;}
  .chk:checked{background:var(--accent);border-color:var(--accent);}
  .chk:checked::after{content:"";position:absolute;left:5px;top:1px;width:6px;height:11px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .card-main{flex:1;min-width:0;}
  .chips{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px;}
  .chip{font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--bg);color:var(--text2);border:1px solid var(--border);display:inline-flex;align-items:center;gap:5px;}
  .chip.exam{background:#EEF4FF;color:#3A5BB0;border-color:#DCE6FB;}
  .chip.topic{background:var(--folder-bg);color:var(--folder);border-color:#E2E0F6;}
  .chip.detailed{background:#F3F2FB;color:var(--folder);border-color:#E2E0F6;}
  .chip.num{color:var(--text1);}
  .conf{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;}
  .conf.hi{color:var(--accent-d);} .conf.lo{color:var(--warning);}

  .qtext{font-size:15.5px;color:var(--text1);line-height:1.55;}
  .qtext b{font-weight:600;}
  .cond-row{display:flex;align-items:flex-start;gap:10px;}
  .cond-row .qtext{flex:1;}
  .cond-pencil{margin-left:0;flex:0 0 auto;}
  .math{white-space:nowrap;font-weight:500;}
  .cond-editor{border:1px solid var(--accent);border-radius:var(--radius-sm);padding:11px;background:#FBFEFC;}
  .cond-src{width:100%;min-height:66px;border:1px solid var(--border-d);border-radius:7px;padding:8px 10px;font-size:15px;font-family:ui-monospace,Menlo,Consolas,monospace;resize:vertical;outline:none;line-height:1.5;}
  .cond-src:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
  .cond-hint{font-size:12px;color:var(--text2);margin:7px 0;display:flex;align-items:center;gap:6px;}
  .cond-preview{font-size:15.5px;color:var(--text1);background:var(--surface);border:1px dashed var(--border-d);border-radius:7px;padding:8px 11px;}
  .cond-preview .pl{font-size:11px;color:var(--text3);display:block;margin-bottom:3px;}
  .cond-actions{display:flex;gap:8px;margin-top:9px;}
  .cond-actions button{font:inherit;font-size:13px;border-radius:7px;padding:7px 13px;cursor:pointer;border:1px solid var(--border-d);background:#fff;color:var(--text1);}
  .mini-save{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;}
  .figure-row{display:flex;gap:12px;align-items:center;margin-top:11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;}
  .figure-thumb{width:66px;height:48px;border-radius:6px;background:#E7EEF9;color:#3F6CB0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;flex:0 0 auto;text-align:center;}
  .figure-meta{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .figure-badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--accent-d);font-weight:500;}
  .figure-replace{align-self:flex-start;background:none;border:1px solid var(--border-d);border-radius:6px;color:var(--text2);font:inherit;font-size:12px;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .figure-replace:hover{background:#fff;color:var(--text1);}
  .formula{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:16px;color:var(--primary);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .formula .fx i{font-style:italic;}
  .latex-toggle{background:none;border:1px solid var(--border-d);border-radius:6px;color:var(--text2);font-size:11px;padding:3px 7px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:ui-monospace,Menlo,Consolas,monospace;flex:0 0 auto;}
  .latex-src{display:none;margin-top:8px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;background:#0F172A;color:#CBD5E1;border-radius:var(--radius-sm);padding:8px 11px;overflow-x:auto;}

  .ansrow{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .ans-label{font-size:13px;color:var(--text2);font-weight:500;}
  .ans-field{min-width:90px;border:1px solid var(--border-d);border-radius:7px;padding:6px 11px;font-size:15px;font-weight:600;color:var(--text1);background:var(--surface);outline:none;}
  .ans-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
  .ans-field.empty{min-width:140px;}
  .ans-flag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;padding:4px 9px;border-radius:7px;}
  .ans-flag.lo{background:var(--warning-bg);color:var(--warning);}
  .ans-flag.hi{background:var(--accent-lt);color:var(--accent-d);}
  .edit-pencil{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:13px;}
  .edit-pencil:hover{color:var(--accent);}

  .rubric{margin-top:11px;background:#F8F8FD;border:1px dashed #D9D7F0;border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:#4B4886;display:flex;gap:9px;align-items:flex-start;}
  .rubric .lk{color:var(--folder);flex:0 0 auto;margin-top:1px;}
  .rubric .only{font-weight:600;}

  .dup-banner{margin-top:12px;background:var(--warning-bg);border:1px solid var(--warning-bd);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--warning);flex-wrap:wrap;}
  .dup-banner b{font-weight:600;}
  .dup-actions{margin-left:auto;display:flex;gap:8px;}
  .mini-btn{font:inherit;font-size:12.5px;border-radius:6px;padding:5px 10px;cursor:pointer;border:1px solid var(--warning-bd);background:#fff;color:var(--warning);}
  .mini-btn.solid{background:var(--warning);color:#fff;border-color:var(--warning);}

  .chatbar{margin-top:18px;border-top:1px solid var(--border);padding-top:16px;}
  .chat-hint{font-size:13px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .chat-hint .ai{color:var(--accent);}
  .sugg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .sugg button{font:inherit;font-size:13px;background:var(--bg);border:1px solid var(--border);color:var(--text1);border-radius:999px;padding:7px 13px;cursor:pointer;}
  .sugg button:hover{background:#E9EEF4;border-color:var(--border-d);}
  .chat-input{display:flex;gap:10px;align-items:center;}
  .chat-input input{flex:1;border:1px solid var(--border-d);border-radius:var(--radius-sm);padding:11px 14px;font:inherit;font-size:16px;outline:none;}
  .chat-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
  .send-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  .savebar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);margin:18px -22px -22px;padding:16px 22px;display:flex;align-items:center;gap:14px;}
  .savebar .count{font-size:14px;color:var(--text2);}
  .savebar .count b{color:var(--text1);font-weight:600;}
  .savebar .spacer{flex:1;}

  .toast-wrap{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .toast{background:var(--primary);color:#fff;border-radius:var(--radius);padding:13px 18px;font-size:14px;display:flex;align-items:center;gap:11px;box-shadow:0 10px 30px rgba(15,23,42,.25);opacity:0;transform:translateY(10px);transition:.3s;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast .ic{color:#86EFAC;display:flex;}

  .saved-state{text-align:center;padding:36px 20px;}
  .saved-state .big{width:64px;height:64px;border-radius:50%;background:var(--accent-lt);color:var(--accent-d);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .saved-state h2{margin:0 0 6px;font-size:19px;font-weight:600;}
  .saved-state p{margin:0 0 20px;color:var(--text2);font-size:14.5px;}
  .saved-state .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

  .footnote{max-width:880px;margin:14px auto 0;padding:0 20px;color:var(--text3);font-size:12.5px;text-align:center;}
  @media(max-width:640px){
    .legend{display:none;} .hint-text{display:none;}
    .wrap{margin:14px auto;} .panel-body{padding:16px;}
    .savebar{margin:16px -16px -16px;padding:14px 16px;}
    .home-actions{width:100%;} .home-actions .btn-primary{flex:1;justify-content:center;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="dot"></span>Сократ</div>
  <div class="crumb" id="crumb"></div>
  <div class="spacer"></div>
  <div class="quota" title="Концепт квоты — открытый вопрос в спецификации">AI-загрузок сегодня: <b>3</b>&nbsp;/&nbsp;20</div>
</div>

<div class="wrap" id="app"></div>
<div class="footnote">Интерактивный прототип · данные демонстрационные · бренд и флоу — SokratAI</div>
<div class="toast-wrap" id="toasts"></div>

<script>
const SVG=(p,s=18,w=2)=>`<svg class="ico" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
const I={
  spark:'<path d="M12 3l1.7 4.8L18.5 9 13.7 10.7 12 15l-1.7-4.3L5.5 9l4.8-1.2z"/><path d="M19 14l.7 2 .8.6-.8.6L19 20l-.7-1.8-.8-.6.8-.6z"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',

  let i=0;
  const run=()=>{
    if(i>0){const p=document.getElementById('ps'+(i-1));p.className='proc-step done';document.getElementById('mk'+(i-1)).innerHTML=SVG(I.check,13);}
    if(i<steps.length){
      const c=document.getElementById('ps'+i);c.className='proc-step run';

      i++;setTimeout(run,820);

  };
  setTimeout(run,400);
}

function confBadge(c){return c==='hi'
  ?`<span class="conf hi">${SVG(I.check,14)}уверенно</span>`
  :`<span class="conf lo">${SVG(I.alert,14)}проверьте</span>`;}

function tex2uni(e){return e
  .replace(/\\text\{([^}]*)\}/g,'$1')
  .replace(/\\sqrt\{([^}]*)\}/g,'√($1)').replace(/\\sqrt/g,'√')
  .replace(/\\sin/g,'sin').replace(/\\cos/g,'cos').replace(/\\tan/g,'tan')
  .replace(/\\cdot/g,'·').replace(/\\times/g,'×')
  .replace(/\\alpha/g,'α').replace(/\\beta/g,'β').replace(/\\mu/g,'μ').replace(/\\pi/g,'π').replace(/\\Delta/g,'Δ')
  .replace(/\\,/g,' ').replace(/\\ /g,' ')
  .replace(/\{,\}/g,',')
  .replace(/\^2/g,'²').replace(/\^3/g,'³')
  .replace(/_0/g,'₀').replace(/_x/g,'ₓ').replace(/_y/g,'ᵧ').replace(/_1/g,'₁').replace(/_2/g,'₂').replace(/_n/g,'ₙ')
  .replace(/[{}]/g,'');}
function prettyLatex(s){return (s||'').replace(/\$([^$]*)\$/g,(m,e)=>`<span class="math">${tex2uni(e)}</span>`);}

function wireResults(){
  stage.querySelectorAll('[data-sel]').forEach(c=>c.onchange=()=>{
    const t=tasks.find(x=>x.id==c.dataset.sel);t.selected=c.checked;
    document.getElementById('card-'+t.id).classList.toggle('off',!t.selected);updateCount();
  });
  stage.querySelectorAll('.ans-field').forEach(f=>f.onchange=()=>{const t=tasks.find(x=>x.id==f.dataset.id);t.answer=f.value;});
  stage.querySelectorAll('[data-latex]').forEach(b=>b.onclick=()=>{const el=document.getElementById('latex-'+b.dataset.latex);el.style.display=el.style.display==='block'?'none':'block';});
  stage.querySelectorAll('[data-focus]').forEach(b=>b.onclick=()=>{const f=stage.querySelector('.ans-field[data-id="'+b.dataset.focus+'"]');f.focus();f.select&&f.select();});
  stage.querySelectorAll('[data-skip]').forEach(b=>b.onclick=()=>{const t=tasks.find(x=>x.id==b.dataset.skip);t.selected=false;syncCard(t);});
  stage.querySelectorAll('[data-keep]').forEach(b=>b.onclick=()=>{const t=tasks.find(x=>x.id==b.dataset.keep);t.selected=true;t.dup=false;renderResults();});
  stage.querySelectorAll('.sugg button').forEach(b=>b.onclick=()=>applyCorrection(b.dataset.msg));
  stage.querySelectorAll('[data-condedit]').forEach(b=>b.onclick=()=>{const t=tasks.find(x=>x.id==b.dataset.condedit);t.editingCond=true;renderResults();const ta=document.getElementById('cs-'+t.id);if(ta){ta.focus();}});
  stage.querySelectorAll('[data-condcancel]').forEach(b=>b.onclick=()=>{const t=tasks.find(x=>x.id==b.dataset.condcancel);t.editingCond=false;renderResults();});
  stage.querySelectorAll('[data-condsave]').forEach(b=>b.onclick=()=>{const t=tasks.find(x=>x.id==b.dataset.condsave);const ta=document.getElementById('cs-'+t.id);if(ta)t.src=ta.value;t.editingCond=false;renderResults();toast('Условие задачи №'+t.id+' обновлено');});
  stage.querySelectorAll('.cond-src').forEach(ta=>ta.oninput=()=>{const p=document.getElementById('cp-'+ta.dataset.prev);if(p)p.innerHTML='<span class="pl">Превью:</span>'+prettyLatex(ta.value);});
  stage.querySelectorAll('[data-replace]').forEach(b=>b.onclick=()=>toast('Прикрепите своё фото — заменю распознанный рисунок. Авторский оригинал я не редактирую.'));
  document.getElementById('chatsend').onclick=sendChat;
  document.getElementById('chatmsg').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
  document.getElementById('save').onclick=doSave;
  document.getElementById('reset').onclick=renderInput;
}
function syncCard(t){const c=document.getElementById('card-'+t.id);if(c){c.classList.toggle('off',!t.selected);const chk=c.querySelector('.chk');if(chk)chk.checked=t.selected;}updateCount();}
function sendChat(){const i=document.getElementById('chatmsg');if(i.value.trim()){applyCorrection(i.value.trim());i.value='';}}

function applyCorrection(msg){
  const m=msg.toLowerCase();
  if(m.includes('дубликат')||m.includes('убери')||m.includes('убрать')){
    const t=tasks.find(x=>x.dup);
    if(t){const c=document.getElementById('card-'+t.id);c.classList.add('removing');
      setTimeout(()=>{tasks=tasks.filter(x=>x.id!==t.id);renderResults();toast('Дубликат убран из набора');},260);}
    return;
  }
  const tm=m.match(/тем[уы]\s*№?\s*(\d+).*?(?:—|-|:|на)\s*([a-zа-яё ]+)$/i);
  if(tm){const id=+tm[1],val=tm[2].trim().replace(/^на\s+/,'');const t=tasks.find(x=>x.id===id);
    if(t){t.topic=val.charAt(0).toUpperCase()+val.slice(1);renderResults();
      const c=document.getElementById('card-'+id);if(c){c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),1200);}
      toast('Тема задачи №'+id+' изменена: '+t.topic);return;}}
  if(m.includes('источник')||m.includes('фипи')){tasks.forEach(t=>t.source='ФИПИ');toast('Источник «ФИПИ» проставлен всем задачам');flashAll();return;}
  const mm=m.match(/№?\s*(\d+).*?(?:—|-|:)\s*(.+)$/);
  if(mm){const id=+mm[1];let val=mm[2].trim().replace(/\.$/,'');const t=tasks.find(x=>x.id===id);
    if(t){t.answer=val;t.answerConf='hi';renderResults();
      const c=document.getElementById('card-'+id);if(c){c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),1200);}
      toast('Ответ к №'+id+' обновлён: '+val);return;}}
  toast('Готово — применил правку');
}
function flashAll(){stage.querySelectorAll('.card').forEach(c=>{c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),900);});}

function updateCount(){const n=tasks.filter(t=>t.selected).length;const el=document.getElementById('savecount');if(el)el.textContent=n;
  const s=document.getElementById('save');if(s){s.disabled=n===0;s.innerHTML=SVG(I.check,18)+'Сохранить '+n+' '+plural(n,'задачу','задачи','задач');}}

function doSave(){
  const sel=tasks.filter(t=>t.selected),skipped=tasks.filter(t=>t.dup&&!t.selected).length;
  const topics=[...new Set(sel.map(t=>t.topic))];
  stage.querySelectorAll('.card').forEach(c=>c.classList.add('saved'));
  setTimeout(()=>{
    stage.innerHTML=`<div class="saved-state">
      <div class="big">${SVG(I.check,30)}</div>
      <h2>Добавлено ${sel.length} ${plural(sel.length,'задача','задачи','задач')} в «${folder}»</h2>
      <p>${skipped?skipped+' пропущена как дубликат. ':''}Разложены по темам: ${topics.join(', ')}. Готовы для конструктора ДЗ и пробников.</p>
      <div class="row">
        <button class="ghost-btn" id="tohome">${SVG(I.folder,16)}В «Мою базу»</button>
        <button class="btn-primary" id="again">${SVG(I.spark,18)}Загрузить ещё</button>
      </div>
    </div>`;
    document.getElementById('again').onclick=openLoader;
    document.getElementById('tohome').onclick=renderHome;
    toast('Добавлено '+sel.length+' в «'+folder+'»'+(skipped?' · '+skipped+' дубликат пропущен':''));
  },420);
}

renderHome();
</script>
</body>
</html>
