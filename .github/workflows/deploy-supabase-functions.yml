name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

          # Mock-exams ПЕРВЫМИ — критичны для пилота (результат/проверка пробника).
          # Деплоим до остальных, чтобы фикс выкатился даже если поздний deploy упадёт.
          # Все 4 — verify_jwt=false: student/tutor делают ручную GoTrue-валидацию
          # (/auth/v1/user, mirror homework-api); public — публичный; grade — service_role.
          supabase functions deploy mock-exam-student-api --no-verify-jwt
          supabase functions deploy mock-exam-tutor-api --no-verify-jwt
          supabase functions deploy mock-exam-grade --no-verify-jwt
          supabase functions deploy mock-exam-public --no-verify-jwt

          # Deploy all actively maintained edge functions.
          # JWT verification is configured per-function in supabase/config.toml.
          supabase functions deploy telegram-bot --no-verify-jwt
          supabase functions deploy chat --no-verify-jwt
          supabase functions deploy setup-telegram-webhook --no-verify-jwt
          supabase functions deploy telegram-auth --no-verify-jwt
          supabase functions deploy telegram-login-token --no-verify-jwt
          supabase functions deploy telegram-broadcast --no-verify-jwt
          supabase functions deploy telegram-scheduled-reminder --no-verify-jwt
          supabase functions deploy trainer-submit --no-verify-jwt
          supabase functions deploy homework-api
          supabase functions deploy push-subscribe
          supabase functions deploy homework-reminder --no-verify-jwt
          supabase functions deploy invite-preview --no-verify-jwt
          supabase functions deploy tutor-account
          supabase functions deploy tutor-manual-add-student
          supabase functions deploy tutor-update-student
          supabase functions deploy tutor-progress-api
          supabase functions deploy lesson-materials-api
          supabase functions deploy student-lessons-api
          supabase functions deploy oauth-google-init --no-verify-jwt
          supabase functions deploy oauth-google-callback --no-verify-jwt
          supabase functions deploy email-verify --no-verify-jwt
          supabase functions deploy auth-email-hook --no-verify-jwt

          echo "✅ All functions deployed successfully!"
