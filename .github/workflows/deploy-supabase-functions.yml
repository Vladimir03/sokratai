name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Деплоим напрямую через --project-ref, БЕЗ `supabase link`: команда
          # link дёргает privileged "project status" endpoint и падает на
          # developer-токене ("does not have the necessary privileges"). Сам
          # deploy требует меньше прав. REF = project id из секрета.
          REF="${{ secrets.SUPABASE_PROJECT_ID }}"

          # Mock-exams ПЕРВЫМИ — критичны для пилота (результат/проверка пробника).
          # Деплоим до остальных, чтобы фикс выкатился даже если поздний deploy упадёт.
          # Все 4 — verify_jwt=false: student/tutor делают ручную GoTrue-валидацию
          # (/auth/v1/user, mirror homework-api); public — публичный; grade — service_role.
          supabase functions deploy mock-exam-student-api --project-ref "$REF" --no-verify-jwt
          supabase functions deploy mock-exam-tutor-api --project-ref "$REF" --no-verify-jwt
          supabase functions deploy mock-exam-grade --project-ref "$REF" --no-verify-jwt
          supabase functions deploy mock-exam-public --project-ref "$REF" --no-verify-jwt

          # Deploy all actively maintained edge functions.
          # JWT verification is configured per-function in supabase/config.toml.
          supabase functions deploy telegram-bot --project-ref "$REF" --no-verify-jwt
          supabase functions deploy chat --project-ref "$REF" --no-verify-jwt
          supabase functions deploy setup-telegram-webhook --project-ref "$REF" --no-verify-jwt
          supabase functions deploy telegram-auth --project-ref "$REF" --no-verify-jwt
          supabase functions deploy telegram-login-token --project-ref "$REF" --no-verify-jwt
          supabase functions deploy telegram-broadcast --project-ref "$REF" --no-verify-jwt
          supabase functions deploy telegram-scheduled-reminder --project-ref "$REF" --no-verify-jwt
          supabase functions deploy trainer-submit --project-ref "$REF" --no-verify-jwt
          supabase functions deploy homework-api --project-ref "$REF"
          supabase functions deploy push-subscribe --project-ref "$REF"
          supabase functions deploy homework-reminder --project-ref "$REF" --no-verify-jwt
          supabase functions deploy invite-preview --project-ref "$REF" --no-verify-jwt
          supabase functions deploy tutor-account --project-ref "$REF"
          supabase functions deploy tutor-manual-add-student --project-ref "$REF"
          supabase functions deploy tutor-update-student --project-ref "$REF"
          supabase functions deploy tutor-progress-api --project-ref "$REF"
          supabase functions deploy lesson-materials-api --project-ref "$REF"
          supabase functions deploy student-lessons-api --project-ref "$REF"
          supabase functions deploy oauth-google-init --project-ref "$REF" --no-verify-jwt
          supabase functions deploy oauth-google-callback --project-ref "$REF" --no-verify-jwt
          supabase functions deploy email-verify --project-ref "$REF" --no-verify-jwt
          supabase functions deploy auth-email-hook --project-ref "$REF" --no-verify-jwt

          echo "✅ All functions deployed successfully!"
